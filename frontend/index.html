<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TaskFlow — The modern SaaS task management platform for high-performing teams. Manage projects, tasks, and team collaboration in one place." />
  <meta name="theme-color" content="#10b981" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <title>TaskFlow — Team Task Management</title>
  <style>
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f4f5f7;
      --color-background-tertiary: #fafbfc;
      --color-text-primary: #172b4d;
      --color-text-secondary: #42526e;
      --color-text-tertiary: #6b778c;
      --color-border-primary: #dfe1e6;
      --color-border-secondary: #ebecf0;
      --color-border-tertiary: #f4f5f7;
      --border-radius-md: 6px;
      --border-radius-lg: 8px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      color: var(--color-text-primary);
      font-family: var(--font-sans);
    }

    * { box-sizing: border-box; }

    /* Prevent flash of unstyled content */
    #root { visibility: hidden; }
    #root.ready { visibility: visible; }
  </style>
</head>

<body>
  <div id="root"></div>
  <script>
    // Apply dark mode before React renders to prevent flash
    if (localStorage.getItem('taskflow_dark') === 'true') {
      document.documentElement.classList.add('dark');
    }
    // Mark root as ready after first paint
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('root').classList.add('ready');
    });
  </script>
  <script type="module" src="/index.jsx"></script>
</body>

</html>
